name: Lint

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        # Report-only. `--deny warnings` would fail the job on every
        # unmaintained-crate warning (e.g. rustls-pemfile) and on the
        # 4 RUSTSEC advisories in rustls-webpki 0.101.x, which is
        # pinned by reqwest 0.11. Upgrading reqwest is out of scope
        # for a "ready for testing" pass — the advisories stay visible
        # in the log so they're not silently hidden.
        run: cargo audit