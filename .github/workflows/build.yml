name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace --all-targets -- --nocapture

      - name: Build Docker
        run: docker build -t waf:${{ github.sha }} .

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build WAF image
        run: docker build -t waf:test .

      - name: Start WAF stack
        run: |
          # Bring up only waf-core and redis; the rest of the stack
          # (admin/prometheus/grafana) is irrelevant to the integration
          # tests, which only hit localhost:8080.
          docker compose up -d waf-core redis

      - name: Wait for WAF to be healthy
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health > /dev/null 2>&1; then
              echo "WAF is up"
              exit 0
            fi
            echo "Waiting for WAF... ($i/30)"
            sleep 2
          done
          echo "WAF did not become healthy in time"
          docker compose logs waf-core
          exit 1

      - name: Run integration tests
        run: cargo test --test integration_tests -- --test-threads=1

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down