version: '3.8'

services:
  # WAF Core Proxy
  waf-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waf-core
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - RUST_LOG=info,waf_core=debug
      - WAF_CONFIG=/app/config/waf.yaml
    volumes:
      - ./config:/app/config:ro
      - ./rules:/app/rules:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - waf-network

  # WAF Admin API
  waf-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waf-admin
    command: /app/waf-admin
    ports:
      - "8081:8081"
    environment:
      - RUST_LOG=info,waf_admin=debug
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
    networks:
      - waf-network

  # Redis (for distributed rate limiting)
  redis:
    image: redis:7-alpine
    container_name: waf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - waf-network

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: waf-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - waf-network

  # Grafana
  grafana:
    image: grafana/grafana:10.2.2
    container_name: waf-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: unless-stopped
    networks:
      - waf-network

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  waf-network:
    driver: bridge